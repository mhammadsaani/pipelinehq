<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Prisma ORM — Full Course</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --bg2: #161b27;
    --bg3: #1e2535;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #e8eaf0;
    --muted: #8b92a5;
    --accent: #5b8af0;
    --accent2: #7c6af5;
    --green: #3ecf8e;
    --amber: #f59e0b;
    --red: #f87171;
    --pink: #e879f9;
  }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  .header {
    padding: 2.5rem 2rem 2rem;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(135deg, #0f1117 0%, #161b27 100%);
    position: relative;
    overflow: hidden;
  }

  .header::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(91,138,240,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }

  .logo {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700; color: white;
    flex-shrink: 0;
  }

  .header h1 {
    font-size: 22px; font-weight: 700;
    background: linear-gradient(90deg, #fff, #8b9fc4);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }

  .subtitle {
    font-size: 13px; color: var(--muted);
    max-width: 600px; line-height: 1.6;
    margin-bottom: 16px;
  }

  .pills { display: flex; gap: 8px; flex-wrap: wrap; }

  .pill {
    font-size: 11px; font-weight: 600;
    padding: 4px 10px; border-radius: 20px;
    letter-spacing: 0.03em;
  }

  .pill-blue  { background: rgba(91,138,240,0.18); color: #7aaef8; border: 1px solid rgba(91,138,240,0.3); }
  .pill-green { background: rgba(62,207,142,0.15); color: #3ecf8e; border: 1px solid rgba(62,207,142,0.25); }
  .pill-purple{ background: rgba(124,106,245,0.18); color: #a48af8; border: 1px solid rgba(124,106,245,0.3); }

  /* ── Layout ── */
  .layout {
    display: flex;
    flex: 1;
    min-height: 0;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 230px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    padding: 1rem 0;
    background: var(--bg);
    overflow-y: auto;
  }

  .sidebar-label {
    font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--muted);
    padding: 0 16px 8px;
  }

  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 16px;
    cursor: pointer;
    transition: background 0.15s;
    border-left: 2px solid transparent;
    user-select: none;
  }

  .nav-item:hover { background: var(--bg2); }

  .nav-item.active {
    background: rgba(91,138,240,0.1);
    border-left-color: var(--accent);
  }

  .nav-num {
    width: 20px; height: 20px;
    border-radius: 50%;
    font-size: 10px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg3); color: var(--muted);
    flex-shrink: 0;
  }

  .nav-item.active .nav-num {
    background: var(--accent);
    color: white;
  }

  .nav-name {
    font-size: 12.5px; font-weight: 500;
    color: var(--muted);
    line-height: 1.3;
  }

  .nav-item.active .nav-name { color: var(--text); }

  /* ── Content ── */
  .content {
    flex: 1;
    padding: 1.5rem 2rem;
    overflow-y: auto;
    max-width: 820px;
  }

  .section { display: none; }
  .section.active { display: block; }

  .section-header {
    margin-bottom: 1.25rem;
  }

  .section-title {
    font-size: 20px; font-weight: 700;
    margin-bottom: 6px;
  }

  .section-desc {
    font-size: 13px; color: var(--muted);
    line-height: 1.6;
  }

  /* ── Cards ── */
  .cards { display: flex; flex-direction: column; gap: 10px; }

  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.15s;
  }

  .card-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 13px 16px;
    cursor: pointer;
    gap: 12px;
    user-select: none;
  }

  .card-head:hover { background: rgba(255,255,255,0.02); }

  .card-title {
    font-size: 14px; font-weight: 600;
    flex: 1;
  }

  .card-meta { display: flex; align-items: center; gap: 8px; }

  .tag {
    font-size: 10px; font-weight: 700;
    padding: 2px 8px; border-radius: 20px;
    letter-spacing: 0.04em; text-transform: uppercase;
  }

  .tag-concept { background: rgba(91,138,240,0.18); color: #7aaef8; }
  .tag-code    { background: rgba(62,207,142,0.15); color: #3ecf8e; }
  .tag-tip     { background: rgba(245,158,11,0.18); color: #fbbf24; }
  .tag-danger  { background: rgba(248,113,113,0.18); color: #f87171; }

  .chevron {
    color: var(--muted); font-size: 11px;
    transition: transform 0.2s;
  }

  .card.open .chevron { transform: rotate(90deg); }
  .card.open { border-color: var(--border2); }

  .card-body {
    display: none;
    padding: 0 16px 16px;
    border-top: 1px solid var(--border);
    padding-top: 14px;
  }

  .card.open .card-body { display: block; }

  .card-body p {
    font-size: 13px; color: var(--muted);
    line-height: 1.75; margin-bottom: 10px;
  }

  /* ── Code blocks ── */
  pre {
    background: #0d1117;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    font-size: 12.5px; line-height: 1.65;
    overflow-x: auto;
    margin: 10px 0;
    color: #abb2bf;
  }

  .kw  { color: #c678dd; }
  .str { color: #98c379; }
  .cmt { color: #5c6370; font-style: italic; }
  .fn  { color: #61afef; }
  .num { color: #d19a66; }
  .tp  { color: #e5c07b; }
  .op  { color: #56b6c2; }

  /* ── Callout boxes ── */
  .box {
    border-radius: 6px;
    padding: 10px 13px;
    font-size: 12.5px; line-height: 1.65;
    margin: 10px 0;
  }

  .box-info   { background: rgba(91,138,240,0.1); border-left: 3px solid var(--accent); color: #7aaef8; }
  .box-tip    { background: rgba(245,158,11,0.1); border-left: 3px solid var(--amber); color: #fbbf24; }
  .box-danger { background: rgba(248,113,113,0.1); border-left: 3px solid var(--red); color: #f87171; }
  .box-green  { background: rgba(62,207,142,0.1); border-left: 3px solid var(--green); color: #3ecf8e; }

  /* ── Lists ── */
  ul.pts { list-style: none; display: flex; flex-direction: column; gap: 6px; margin: 8px 0; }
  ul.pts li {
    font-size: 13px; color: var(--muted);
    padding-left: 18px; position: relative; line-height: 1.6;
  }
  ul.pts li::before {
    content: '▸'; position: absolute; left: 0;
    color: var(--accent); font-size: 10px; top: 3px;
  }

  code {
    font-family: 'Cascadia Code', 'Fira Code', monospace;
    font-size: 12px;
    background: rgba(255,255,255,0.07);
    padding: 1px 5px; border-radius: 4px;
    color: #e5c07b;
  }

  /* ── Progress dots ── */
  .dots {
    display: flex; gap: 4px;
    padding: 6px 16px 0;
    margin-bottom: 2px;
  }

  .dot {
    width: 4px; height: 4px; border-radius: 50%;
    background: var(--border2);
  }

  .dot.done { background: var(--accent); }

</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-top">
    <div class="logo">P</div>
    <h1>Prisma ORM — Full Course</h1>
  </div>
  <p class="subtitle">Everything you need — schema design, relations, CRUD, migrations, advanced patterns, and production tips. Click any module → expand any card.</p>
  <div class="pills">
    <span class="pill pill-blue">9 Modules</span>
    <span class="pill pill-green">Beginner → Advanced</span>
    <span class="pill pill-purple">TypeScript + Node.js</span>
  </div>
</div>

<!-- Body -->
<div class="layout">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-label">Modules</div>
    <div id="nav"></div>
  </div>

  <!-- Content -->
  <div class="content" id="content"></div>

</div>

<script>
const data = [
  {
    name: "What is Prisma?",
    desc: "The big picture — what Prisma is, its three tools, supported databases, and how to install it.",
    cards: [
      {
        title: "Prisma at a glance",
        tag: "concept",
        html: `<p>Prisma is a <strong style="color:#e8eaf0">next-generation ORM</strong> for Node.js and TypeScript. It has three main tools:</p>
        <ul class="pts">
          <li><strong style="color:#e8eaf0">Prisma Client</strong> — auto-generated, fully type-safe query builder</li>
          <li><strong style="color:#e8eaf0">Prisma Migrate</strong> — declarative, version-controlled database migrations</li>
          <li><strong style="color:#e8eaf0">Prisma Studio</strong> — GUI to browse and edit your database</li>
        </ul>
        <p>Unlike Sequelize or TypeORM, Prisma does <em>not</em> use the ActiveRecord pattern. You define a schema file, Prisma generates a fully-typed client. The types change based on your <code>select</code> and <code>include</code> at compile time.</p>`
      },
      {
        title: "Supported databases",
        tag: "concept",
        html: `<ul class="pts">
          <li>PostgreSQL, MySQL, SQLite, SQL Server, CockroachDB (full support)</li>
          <li>MongoDB — supported via Prisma Client with some differences around relations</li>
        </ul>
        <div class="box box-tip">Most Prisma features work identically across all SQL databases. SQLite is great for local dev; switch to PostgreSQL for production with zero code changes.</div>`
      },
      {
        title: "Installation",
        tag: "code",
        html: `<pre><span class="cmt"># Install Prisma CLI (dev dep) and the client runtime</span>
npm install prisma --save-dev
npm install @prisma/client

<span class="cmt"># Scaffold schema.prisma + .env</span>
npx prisma init --datasource-provider postgresql</pre>
        <p>Set your connection string in <code>.env</code>:</p>
        <pre><span class="str">DATABASE_URL="postgresql://user:password@localhost:5432/mydb"</span></pre>
        <p>After changing the schema, always regenerate the client:</p>
        <pre>npx prisma generate</pre>`
      }
    ]
  },
  {
    name: "Schema Basics",
    desc: "The Prisma schema file — models, field types, attributes, and conventions.",
    cards: [
      {
        title: "The schema.prisma file",
        tag: "concept",
        html: `<p>Lives at <code>prisma/schema.prisma</code>. Three sections:</p>
        <pre><span class="cmt">// 1. datasource — your DB</span>
<span class="kw">datasource</span> db {
  provider = <span class="str">"postgresql"</span>
  url      = env(<span class="str">"DATABASE_URL"</span>)
}

<span class="cmt">// 2. generator — what to generate</span>
<span class="kw">generator</span> client {
  provider = <span class="str">"prisma-client-js"</span>
}

<span class="cmt">// 3. your models</span>
<span class="kw">model</span> <span class="tp">User</span> {
  id    <span class="tp">Int</span>    <span class="fn">@id</span> <span class="fn">@default</span>(autoincrement())
  email <span class="tp">String</span> <span class="fn">@unique</span>
  name  <span class="tp">String</span>?
}</pre>`
      },
      {
        title: "Field types & modifiers",
        tag: "concept",
        html: `<pre><span class="kw">model</span> <span class="tp">Post</span> {
  id        <span class="tp">Int</span>      <span class="fn">@id</span> <span class="fn">@default</span>(autoincrement())
  title     <span class="tp">String</span>              <span class="cmt">// required</span>
  body      <span class="tp">String</span>?             <span class="cmt">// optional / nullable</span>
  views     <span class="tp">Int</span>      <span class="fn">@default</span>(<span class="num">0</span>)
  tags      <span class="tp">String</span>[]            <span class="cmt">// array (PostgreSQL only)</span>
  published <span class="tp">Boolean</span>  <span class="fn">@default</span>(<span class="kw">false</span>)
  meta      <span class="tp">Json</span>?
  createdAt <span class="tp">DateTime</span> <span class="fn">@default</span>(now())
  updatedAt <span class="tp">DateTime</span> <span class="fn">@updatedAt</span>
}</pre>
        <p>Scalar types: <code>String</code> <code>Int</code> <code>Float</code> <code>Boolean</code> <code>DateTime</code> <code>Json</code> <code>Bytes</code> <code>BigInt</code> <code>Decimal</code></p>`
      },
      {
        title: "Field & model attributes",
        tag: "code",
        html: `<pre><span class="cmt">// Field-level</span>
<span class="fn">@id</span>               <span class="cmt">// primary key</span>
<span class="fn">@default</span>(value)   <span class="cmt">// default: autoincrement(), cuid(), uuid(), now(), false…</span>
<span class="fn">@unique</span>           <span class="cmt">// unique constraint</span>
<span class="fn">@updatedAt</span>        <span class="cmt">// auto-set on every update</span>
<span class="fn">@map</span>(<span class="str">"col_name"</span>) <span class="cmt">// rename in DB without renaming in code</span>
<span class="fn">@ignore</span>           <span class="cmt">// exclude from Prisma Client entirely</span>

<span class="cmt">// Model-level</span>
<span class="fn">@@id</span>([a, b])         <span class="cmt">// composite primary key</span>
<span class="fn">@@unique</span>([a, b])     <span class="cmt">// composite unique constraint</span>
<span class="fn">@@index</span>([a, b])      <span class="cmt">// creates a DB index</span>
<span class="fn">@@map</span>(<span class="str">"table_name"</span>) <span class="cmt">// map model to different DB table name</span></pre>`
      }
    ]
  },
  {
    name: "Relations",
    desc: "Model relationships — one-to-one, one-to-many, many-to-many, and self-relations.",
    cards: [
      {
        title: "One-to-many",
        tag: "code",
        html: `<p>The most common pattern. A User has many Posts:</p>
        <pre><span class="kw">model</span> <span class="tp">User</span> {
  id    <span class="tp">Int</span>    <span class="fn">@id</span> <span class="fn">@default</span>(autoincrement())
  email <span class="tp">String</span> <span class="fn">@unique</span>
  posts <span class="tp">Post</span>[]  <span class="cmt">// virtual — not a real DB column</span>
}

<span class="kw">model</span> <span class="tp">Post</span> {
  id       <span class="tp">Int</span>    <span class="fn">@id</span> <span class="fn">@default</span>(autoincrement())
  title    <span class="tp">String</span>
  author   <span class="tp">User</span>   <span class="fn">@relation</span>(fields: [authorId], references: [id])
  authorId <span class="tp">Int</span>          <span class="cmt">// this is the actual FK column in the DB</span>
}</pre>
        <div class="box box-info">The <code>posts</code> field on User is a virtual relation field — it does not exist as a column. Only <code>authorId</code> lives in the database.</div>`
      },
      {
        title: "Many-to-many",
        tag: "code",
        html: `<pre><span class="cmt">// Implicit — Prisma manages the join table automatically</span>
<span class="kw">model</span> <span class="tp">Post</span>     { id <span class="tp">Int</span> <span class="fn">@id</span> <span class="fn">@default</span>(autoincrement()); categories <span class="tp">Category</span>[] }
<span class="kw">model</span> <span class="tp">Category</span> { id <span class="tp">Int</span> <span class="fn">@id</span> <span class="fn">@default</span>(autoincrement()); posts      <span class="tp">Post</span>[] }

<span class="cmt">// Explicit join table — when the join itself has fields</span>
<span class="kw">model</span> <span class="tp">PostCategory</span> {
  post       <span class="tp">Post</span>     <span class="fn">@relation</span>(fields: [postId],     references: [id])
  postId     <span class="tp">Int</span>
  category   <span class="tp">Category</span> <span class="fn">@relation</span>(fields: [categoryId], references: [id])
  categoryId <span class="tp">Int</span>
  assignedAt <span class="tp">DateTime</span> <span class="fn">@default</span>(now())
  <span class="fn">@@id</span>([postId, categoryId])
}</pre>`
      },
      {
        title: "One-to-one & self-relations",
        tag: "code",
        html: `<pre><span class="cmt">// One-to-one (User ↔ Profile)</span>
<span class="kw">model</span> <span class="tp">User</span>    { id <span class="tp">Int</span> <span class="fn">@id</span> <span class="fn">@default</span>(autoincrement()); profile <span class="tp">Profile</span>? }
<span class="kw">model</span> <span class="tp">Profile</span> {
  id     <span class="tp">Int</span>    <span class="fn">@id</span> <span class="fn">@default</span>(autoincrement())
  bio    <span class="tp">String</span>
  user   <span class="tp">User</span>   <span class="fn">@relation</span>(fields: [userId], references: [id])
  userId <span class="tp">Int</span>    <span class="fn">@unique</span>  <span class="cmt">// @unique enforces the 1:1</span>
}

<span class="cmt">// Self-relation (e.g. Comment with replies)</span>
<span class="kw">model</span> <span class="tp">Comment</span> {
  id       <span class="tp">Int</span>       <span class="fn">@id</span> <span class="fn">@default</span>(autoincrement())
  text     <span class="tp">String</span>
  parent   <span class="tp">Comment</span>?  <span class="fn">@relation</span>(<span class="str">"Replies"</span>, fields: [parentId], references: [id])
  parentId <span class="tp">Int</span>?
  replies  <span class="tp">Comment</span>[] <span class="fn">@relation</span>(<span class="str">"Replies"</span>)
}</pre>`
      }
    ]
  },
  {
    name: "CRUD Queries",
    desc: "Create, read, update, delete — the full Prisma Client API for everyday operations.",
    cards: [
      {
        title: "Create",
        tag: "code",
        html: `<pre><span class="kw">import</span> { PrismaClient } <span class="kw">from</span> <span class="str">'@prisma/client'</span>
<span class="kw">const</span> prisma = <span class="kw">new</span> <span class="fn">PrismaClient</span>()

<span class="cmt">// Single record</span>
<span class="kw">const</span> user = <span class="kw">await</span> prisma.user.<span class="fn">create</span>({
  data: { email: <span class="str">'alice@example.com'</span>, name: <span class="str">'Alice'</span> }
})

<span class="cmt">// Bulk insert</span>
<span class="kw">await</span> prisma.user.<span class="fn">createMany</span>({
  data: [
    { email: <span class="str">'bob@example.com'</span> },
    { email: <span class="str">'charlie@example.com'</span> }
  ],
  skipDuplicates: <span class="kw">true</span>
})

<span class="cmt">// Create with nested relation (create post + connect user)</span>
<span class="kw">await</span> prisma.post.<span class="fn">create</span>({
  data: {
    title: <span class="str">'Hello World'</span>,
    author: { connect: { id: <span class="num">1</span> } }
  }
})</pre>`
      },
      {
        title: "Read — findUnique / findFirst / findMany",
        tag: "code",
        html: `<pre><span class="cmt">// findUnique — must filter on @id or @unique field</span>
<span class="kw">const</span> user = <span class="kw">await</span> prisma.user.<span class="fn">findUnique</span>({ where: { email: <span class="str">'alice@example.com'</span> } })

<span class="cmt">// findFirst — first match (any filter)</span>
<span class="kw">const</span> post = <span class="kw">await</span> prisma.post.<span class="fn">findFirst</span>({ where: { published: <span class="kw">true</span> }, orderBy: { createdAt: <span class="str">'desc'</span> } })

<span class="cmt">// findMany — full list with filters, sorting, pagination</span>
<span class="kw">const</span> posts = <span class="kw">await</span> prisma.post.<span class="fn">findMany</span>({
  where: {
    published: <span class="kw">true</span>,
    createdAt: { gte: <span class="kw">new</span> <span class="fn">Date</span>(<span class="str">'2024-01-01'</span>) }
  },
  orderBy: { createdAt: <span class="str">'desc'</span> },
  take: <span class="num">10</span>,   <span class="cmt">// LIMIT</span>
  skip: <span class="num">20</span>,   <span class="cmt">// OFFSET — combine with take for pagination</span>
  select: { id: <span class="kw">true</span>, title: <span class="kw">true</span>, createdAt: <span class="kw">true</span> }
})</pre>`
      },
      {
        title: "Update, Upsert & Delete",
        tag: "code",
        html: `<pre><span class="cmt">// Update one</span>
<span class="kw">await</span> prisma.user.<span class="fn">update</span>({ where: { id: <span class="num">1</span> }, data: { name: <span class="str">'Alicia'</span> } })

<span class="cmt">// Atomic numeric operations</span>
<span class="kw">await</span> prisma.post.<span class="fn">update</span>({ where: { id: <span class="num">5</span> }, data: { views: { increment: <span class="num">1</span> } } })
<span class="cmt">// also: decrement, multiply, divide, set</span>

<span class="cmt">// Update many</span>
<span class="kw">await</span> prisma.post.<span class="fn">updateMany</span>({ where: { authorId: <span class="num">1</span> }, data: { published: <span class="kw">false</span> } })

<span class="cmt">// Upsert</span>
<span class="kw">await</span> prisma.user.<span class="fn">upsert</span>({
  where:  { email: <span class="str">'alice@example.com'</span> },
  update: { name: <span class="str">'Alice Updated'</span> },
  create: { email: <span class="str">'alice@example.com'</span>, name: <span class="str">'Alice'</span> }
})

<span class="cmt">// Delete</span>
<span class="kw">await</span> prisma.user.<span class="fn">delete</span>({ where: { id: <span class="num">1</span> } })
<span class="kw">await</span> prisma.user.<span class="fn">deleteMany</span>({ where: { active: <span class="kw">false</span> } })</pre>`
      }
    ]
  },
  {
    name: "Select & Include",
    desc: "Control exactly what you fetch — field selection, eager loading, nested queries, relation counts.",
    cards: [
      {
        title: "select vs include",
        tag: "concept",
        html: `<p><code>select</code> specifies exactly which fields to return. <code>include</code> adds relations on top of all default fields. You cannot use both at the top level simultaneously.</p>
        <pre><span class="cmt">// select — returns only id and email</span>
prisma.user.<span class="fn">findUnique</span>({ where: { id: <span class="num">1</span> }, select: { id: <span class="kw">true</span>, email: <span class="kw">true</span> } })
<span class="cmt">// type: { id: number; email: string }</span>

<span class="cmt">// include — returns all fields + posts relation</span>
prisma.user.<span class="fn">findUnique</span>({ where: { id: <span class="num">1</span> }, include: { posts: <span class="kw">true</span> } })
<span class="cmt">// type: User & { posts: Post[] }</span></pre>
        <div class="box box-info">Prisma's return types are fully inferred based on your select/include — no casting needed. This is one of its biggest advantages over raw SQL.</div>`
      },
      {
        title: "Nested selects & filtering relations",
        tag: "code",
        html: `<pre><span class="kw">const</span> user = <span class="kw">await</span> prisma.user.<span class="fn">findUnique</span>({
  where: { id: <span class="num">1</span> },
  include: {
    posts: {
      where:   { published: <span class="kw">true</span> },
      orderBy: { createdAt: <span class="str">'desc'</span> },
      take:    <span class="num">5</span>,
      select:  { id: <span class="kw">true</span>, title: <span class="kw">true</span> }
    }
  }
})
<span class="cmt">// user.posts is typed: { id: number; title: string }[]</span></pre>`
      },
      {
        title: "Relation counts",
        tag: "code",
        html: `<pre><span class="cmt">// Count posts without fetching them</span>
<span class="kw">const</span> user = <span class="kw">await</span> prisma.user.<span class="fn">findUnique</span>({
  where: { id: <span class="num">1</span> },
  include: { _count: { select: { posts: <span class="kw">true</span> } } }
})
console.<span class="fn">log</span>(user._count.posts) <span class="cmt">// number</span>

<span class="cmt">// Also works in findMany</span>
<span class="kw">const</span> users = <span class="kw">await</span> prisma.user.<span class="fn">findMany</span>({
  include: { _count: { select: { posts: <span class="kw">true</span>, comments: <span class="kw">true</span> } } }
})</pre>`
      }
    ]
  },
  {
    name: "Filtering & Operators",
    desc: "The full where clause — comparison, logical, string, null, and relation filters.",
    cards: [
      {
        title: "Comparison & logical operators",
        tag: "code",
        html: `<pre>where: {
  age:  { gt: <span class="num">18</span>, lte: <span class="num">65</span> }, <span class="cmt">// gt gte lt lte</span>
  name: { not: <span class="str">'Bob'</span> },
  id:   { in: [<span class="num">1</span>, <span class="num">2</span>, <span class="num">3</span>] },   <span class="cmt">// notIn also works</span>

  <span class="cmt">// Logical combinators</span>
  AND: [{ active: <span class="kw">true</span> }, { verified: <span class="kw">true</span> }],
  OR:  [{ role: <span class="str">'ADMIN'</span> }, { role: <span class="str">'MOD'</span> }],
  NOT: { banned: <span class="kw">true</span> },

  <span class="cmt">// Null checks</span>
  deletedAt: <span class="kw">null</span>,           <span class="cmt">// IS NULL</span>
  bio: { not: <span class="kw">null</span> },        <span class="cmt">// IS NOT NULL</span>
}</pre>`
      },
      {
        title: "String filters",
        tag: "code",
        html: `<pre>where: {
  email: { contains: <span class="str">'@gmail.com'</span> },
  name:  { startsWith: <span class="str">'Al'</span> },
  bio:   { endsWith: <span class="str">'developer'</span> },

  <span class="cmt">// Case-insensitive (PostgreSQL, MySQL)</span>
  email: {
    contains: <span class="str">'gmail'</span>,
    mode: <span class="str">'insensitive'</span>
  },
}</pre>`
      },
      {
        title: "Relation filters",
        tag: "code",
        html: `<pre><span class="cmt">// At least one matching related record</span>
where: { posts: { some: { published: <span class="kw">true</span> } } }

<span class="cmt">// All related records match</span>
where: { posts: { every: { published: <span class="kw">true</span> } } }

<span class="cmt">// No related records match</span>
where: { posts: { none: {} } }

<span class="cmt">// Filter on a to-one relation</span>
where: { profile: { is:    { bio: { not: <span class="kw">null</span> } } } }
where: { profile: { isNot: <span class="kw">null</span> } }</pre>`
      }
    ]
  },
  {
    name: "Migrations",
    desc: "Evolve your database schema safely with Prisma Migrate, introspection, and seeding.",
    cards: [
      {
        title: "The migration workflow",
        tag: "concept",
        html: `<ul class="pts">
          <li>Edit <code>schema.prisma</code></li>
          <li>Run <code>prisma migrate dev</code> — diffs schema, generates SQL file, applies it, regenerates client</li>
          <li>Commit migration files to git alongside code</li>
          <li>In production, run <code>prisma migrate deploy</code></li>
        </ul>
        <pre><span class="cmt"># Development</span>
npx prisma migrate dev --name add_user_role

<span class="cmt"># Preview what SQL would be generated (no apply)</span>
npx prisma migrate dev --create-only

<span class="cmt"># Production</span>
npx prisma migrate deploy

<span class="cmt"># Reset DB (drops everything, re-applies all migrations, runs seed)</span>
npx prisma migrate reset</pre>`
      },
      {
        title: "Introspecting an existing database",
        tag: "code",
        html: `<p>Already have a database? Pull its schema into Prisma:</p>
        <pre>npx prisma db pull    <span class="cmt"># generates schema.prisma from your DB</span>
npx prisma generate   <span class="cmt"># generate the client</span></pre>
        <div class="box box-tip">Use <code>db pull</code> when adopting Prisma on an existing project. Use <code>migrate dev</code> for greenfield projects where Prisma owns the schema.</div>`
      },
      {
        title: "Seeding",
        tag: "code",
        html: `<p>Create <code>prisma/seed.ts</code>:</p>
        <pre><span class="kw">import</span> { PrismaClient } <span class="kw">from</span> <span class="str">'@prisma/client'</span>
<span class="kw">const</span> prisma = <span class="kw">new</span> <span class="fn">PrismaClient</span>()

<span class="kw">async function</span> <span class="fn">main</span>() {
  <span class="kw">await</span> prisma.user.<span class="fn">upsert</span>({
    where:  { email: <span class="str">'admin@example.com'</span> },
    update: {},
    create: { email: <span class="str">'admin@example.com'</span>, name: <span class="str">'Admin'</span> }
  })
}

<span class="fn">main</span>().<span class="fn">catch</span>(console.error).<span class="fn">finally</span>(() => prisma.<span class="fn">$disconnect</span>())</pre>
        <p>Add to <code>package.json</code>:</p>
        <pre><span class="str">"prisma"</span>: { <span class="str">"seed"</span>: <span class="str">"ts-node prisma/seed.ts"</span> }</pre>
        <pre>npx prisma db seed</pre>`
      }
    ]
  },
  {
    name: "Advanced Patterns",
    desc: "Transactions, raw SQL, middleware, Prisma Extensions, aggregations, and pagination.",
    cards: [
      {
        title: "Transactions",
        tag: "code",
        html: `<pre><span class="cmt">// Sequential — all or nothing, order matters</span>
<span class="kw">const</span> [user, post] = <span class="kw">await</span> prisma.<span class="fn">$transaction</span>([
  prisma.user.<span class="fn">create</span>({ data: { email: <span class="str">'a@b.com'</span> } }),
  prisma.post.<span class="fn">create</span>({ data: { title: <span class="str">'Hi'</span>, authorId: <span class="num">1</span> } })
])

<span class="cmt">// Interactive — conditional logic, use tx instead of prisma</span>
<span class="kw">await</span> prisma.<span class="fn">$transaction</span>(<span class="kw">async</span> (tx) => {
  <span class="kw">const</span> from = <span class="kw">await</span> tx.account.<span class="fn">update</span>({
    where: { id: <span class="num">1</span> },
    data:  { balance: { decrement: <span class="num">100</span> } }
  })
  <span class="kw">if</span> (from.balance < <span class="num">0</span>) <span class="kw">throw new</span> <span class="fn">Error</span>(<span class="str">'Insufficient funds'</span>)
  <span class="kw">await</span> tx.account.<span class="fn">update</span>({
    where: { id: <span class="num">2</span> },
    data:  { balance: { increment: <span class="num">100</span> } }
  })
})</pre>`
      },
      {
        title: "Raw SQL with $queryRaw",
        tag: "code",
        html: `<pre><span class="cmt">// Typed raw query (returns unknown[] by default)</span>
<span class="kw">const</span> users = <span class="kw">await</span> prisma.<span class="fn">$queryRaw</span>&lt;<span class="tp">User</span>[]&gt;<span class="op">\`</span>SELECT * FROM <span class="str">"User"</span> WHERE active = true<span class="op">\`</span>

<span class="cmt">// ALWAYS use Prisma.sql for dynamic values — prevents SQL injection</span>
<span class="kw">import</span> { Prisma } <span class="kw">from</span> <span class="str">'@prisma/client'</span>
<span class="kw">const</span> email = <span class="str">'alice@example.com'</span>
<span class="kw">const</span> result = <span class="kw">await</span> prisma.<span class="fn">$queryRaw</span>(
  Prisma.sql<span class="op">\`</span>SELECT * FROM <span class="str">"User"</span> WHERE email = \${email}<span class="op">\`</span>
)

<span class="cmt">// $executeRaw for INSERT/UPDATE/DELETE without return</span>
<span class="kw">await</span> prisma.<span class="fn">$executeRaw</span><span class="op">\`</span>UPDATE <span class="str">"Post"</span> SET views = <span class="num">0</span><span class="op">\`</span></pre>
        <div class="box box-danger">Never use string interpolation directly in $queryRaw. Always use Prisma.sql template tags — they parameterise values automatically.</div>`
      },
      {
        title: "Aggregations & groupBy",
        tag: "code",
        html: `<pre><span class="cmt">// Aggregate</span>
<span class="kw">const</span> stats = <span class="kw">await</span> prisma.post.<span class="fn">aggregate</span>({
  _count: { id: <span class="kw">true</span> },
  _avg:   { views: <span class="kw">true</span> },
  _max:   { views: <span class="kw">true</span> },
  _min:   { createdAt: <span class="kw">true</span> },
  where:  { published: <span class="kw">true</span> }
})

<span class="cmt">// Group by</span>
<span class="kw">const</span> byAuthor = <span class="kw">await</span> prisma.post.<span class="fn">groupBy</span>({
  by:     [<span class="str">'authorId'</span>],
  _count: { id: <span class="kw">true</span> },
  _avg:   { views: <span class="kw">true</span> },
  having: { views: { _avg: { gt: <span class="num">100</span> } } }
})</pre>`
      },
      {
        title: "Cursor-based pagination",
        tag: "tip",
        html: `<p>For large datasets, cursor pagination is more efficient than offset (<code>skip</code>):</p>
        <pre><span class="cmt">// Page 1</span>
<span class="kw">const</span> page1 = <span class="kw">await</span> prisma.post.<span class="fn">findMany</span>({ take: <span class="num">10</span>, orderBy: { id: <span class="str">'asc'</span> } })
<span class="kw">const</span> lastId = page1[page1.length - <span class="num">1</span>].id

<span class="cmt">// Next page — start after the last cursor</span>
<span class="kw">const</span> page2 = <span class="kw">await</span> prisma.post.<span class="fn">findMany</span>({
  take:   <span class="num">10</span>,
  skip:   <span class="num">1</span>,           <span class="cmt">// skip the cursor itself</span>
  cursor: { id: lastId },
  orderBy: { id: <span class="str">'asc'</span> }
})</pre>
        <div class="box box-tip">Cursor pagination is O(1) regardless of page depth. Offset pagination is O(n) and degrades as the table grows.</div>`
      }
    ]
  },
  {
    name: "Performance & Production",
    desc: "N+1 avoidance, connection pooling, indexes, logging, and serverless best practices.",
    cards: [
      {
        title: "The N+1 problem — most common trap",
        tag: "danger",
        html: `<div class="box box-danger">N+1 is the #1 performance mistake with ORMs. Fetching N users then querying posts for each = N+1 DB round trips.</div>
        <pre><span class="cmt">// BAD — 1 query for users + N queries for posts</span>
<span class="kw">const</span> users = <span class="kw">await</span> prisma.user.<span class="fn">findMany</span>()
<span class="kw">for</span> (<span class="kw">const</span> u <span class="kw">of</span> users) {
  <span class="kw">const</span> posts = <span class="kw">await</span> prisma.post.<span class="fn">findMany</span>({ where: { authorId: u.id } })
}

<span class="cmt">// GOOD — 1 query (Prisma joins automatically)</span>
<span class="kw">const</span> users = <span class="kw">await</span> prisma.user.<span class="fn">findMany</span>({
  include: { posts: <span class="kw">true</span> }
})</pre>`
      },
      {
        title: "Connection pooling & serverless",
        tag: "tip",
        html: `<p>In serverless (Vercel, Lambda), each function invocation can create a new <code>PrismaClient</code>, exhausting DB connections. Use a singleton:</p>
        <pre><span class="cmt">// lib/prisma.ts</span>
<span class="kw">import</span> { PrismaClient } <span class="kw">from</span> <span class="str">'@prisma/client'</span>
<span class="kw">const</span> g = globalThis <span class="kw">as</span> { prisma?: <span class="tp">PrismaClient</span> }
<span class="kw">export const</span> prisma = g.prisma ?? <span class="kw">new</span> <span class="fn">PrismaClient</span>()
<span class="kw">if</span> (process.env.NODE_ENV !== <span class="str">'production'</span>) g.prisma = prisma</pre>
        <div class="box box-tip">For high-traffic serverless at scale, use <strong>Prisma Accelerate</strong> — a managed connection pooler + global edge cache from Prisma.</div>`
      },
      {
        title: "Indexes & query performance",
        tag: "tip",
        html: `<p>Add indexes on columns you frequently filter or sort by:</p>
        <pre><span class="kw">model</span> <span class="tp">Post</span> {
  id        <span class="tp">Int</span>      <span class="fn">@id</span> <span class="fn">@default</span>(autoincrement())
  authorId  <span class="tp">Int</span>
  createdAt <span class="tp">DateTime</span> <span class="fn">@default</span>(now())

  <span class="fn">@@index</span>([authorId])                  <span class="cmt">// single-column</span>
  <span class="fn">@@index</span>([authorId, createdAt])       <span class="cmt">// composite</span>
}</pre>
        <ul class="pts">
          <li>Index every foreign key (Prisma does NOT do this automatically)</li>
          <li>Index columns used in <code>where</code>, <code>orderBy</code></li>
          <li>Use <code>$queryRaw</code> + <code>EXPLAIN ANALYZE</code> to diagnose slow queries</li>
        </ul>`
      },
      {
        title: "Logging & debugging",
        tag: "code",
        html: `<pre><span class="kw">const</span> prisma = <span class="kw">new</span> <span class="fn">PrismaClient</span>({
  log: [<span class="str">'query'</span>, <span class="str">'warn'</span>, <span class="str">'error'</span>]
})

<span class="cmt">// Event-based logging (log slow queries)</span>
prisma.<span class="fn">$on</span>(<span class="str">'query'</span>, (e) => {
  <span class="kw">if</span> (e.duration > <span class="num">200</span>) console.<span class="fn">warn</span>(<span class="str">'Slow query:'</span>, e.query, e.duration + <span class="str">'ms'</span>)
})</pre>
        <p>Or quickly enable via env var:</p>
        <pre>DEBUG=<span class="str">"prisma:query"</span> node server.js</pre>`
      }
    ]
  }
];

// Build nav & sections
const nav = document.getElementById('nav');
const content = document.getElementById('content');

data.forEach((mod, i) => {
  // Nav item
  const item = document.createElement('div');
  item.className = 'nav-item' + (i === 0 ? ' active' : '');
  item.innerHTML = `<div class="nav-num">${i+1}</div><div class="nav-name">${mod.name}</div>`;
  item.onclick = () => activate(i);
  nav.appendChild(item);

  // Section
  const sec = document.createElement('div');
  sec.className = 'section' + (i === 0 ? ' active' : '');
  sec.id = 's' + i;

  const cards = mod.cards.map(c => `
    <div class="card" onclick="toggle(this)">
      <div class="card-head">
        <div class="card-title">${c.title}</div>
        <div class="card-meta">
          <span class="tag tag-${c.tag}">${c.tag}</span>
          <span class="chevron">▶</span>
        </div>
      </div>
      <div class="card-body">${c.html}</div>
    </div>
  `).join('');

  sec.innerHTML = `
    <div class="section-header">
      <div class="section-title">Module ${i+1}: ${mod.name}</div>
      <div class="section-desc">${mod.desc}</div>
    </div>
    <div class="cards">${cards}</div>
  `;
  content.appendChild(sec);
});

function activate(i) {
  document.querySelectorAll('.nav-item').forEach((el, j) => el.classList.toggle('active', j === i));
  document.querySelectorAll('.section').forEach((el, j) => el.classList.toggle('active', j === i));
}

function toggle(card) {
  card.classList.toggle('open');
}
</script>
